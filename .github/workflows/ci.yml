name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/MageBackend.csproj

      - name: Lint (dotnet format)
        run: dotnet format src/MageBackend.csproj --verify-no-changes --no-restore

      - name: Build
        run: dotnet build src/MageBackend.csproj --no-restore -c Release

      - name: Run tests with coverage
        env:
          ENVIRONMENT: test
          DATABASE_URL: "Server=localhost,1433;Database=ci;User Id=sa;Password=Password123!;TrustServerCertificate=True;"
          MESSAGING_ENABLED: "false"
        run: |
          dotnet test tests/MageBackend.Tests.csproj \
            --no-restore \
            --collect:"XPlat Code Coverage" \
            --logger "console;verbosity=minimal"

      - name: Check coverage gate (100% line+branch)
        run: |
          python3 - <<'PY'
          import glob, re
          xmls = glob.glob("tests/TestResults/*/coverage.cobertura.xml")
          if not xmls:
            raise SystemExit("No coverage file found")
          with open(xmls[0]) as f:
            data = f.read()
          m = re.search(r'line-rate="([^"]+)"[^>]*branch-rate="([^"]+)"', data.split('</sources>')[1])
          if not m:
            raise SystemExit("No overall line/branch rate found")
          lr, br = float(m.group(1)), float(m.group(2))
          if lr < 0.999 or br < 0.999:
            raise SystemExit(f"Coverage below 100% — lines: {lr*100:.1f}%, branches: {br*100:.1f}%")
          print(f"✅ Coverage gate passed: lines {lr*100:.1f}%, branches {br*100:.1f}%")
          PY
