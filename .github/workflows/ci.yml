name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET SDK 10.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore NuGet Packages
      run: dotnet restore tests/MageBackend.Tests.csproj

    - name: Build Project
      run: dotnet build src/MageBackend.csproj --configuration Release --no-restore

    - name: Build Tests Project
      run: dotnet build tests/MageBackend.Tests.csproj --configuration Debug --no-restore

    - name: Run Integration & Unit Tests
      env:
        LANG: C.UTF-8
        LC_ALL: C.UTF-8
      run: dotnet test tests/MageBackend.Tests.csproj -m:1 --configuration Debug --no-restore

  sonar:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup .NET SDK 10.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Cache SonarQube scanners
      uses: actions/cache@v4
      with:
        path: ~/.sonar
        key: ${{ runner.os }}-sonar-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-sonar-

    - name: Install SonarScanner for .NET
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Install SonarScanner CLI (Java)
      run: |
        mkdir -p ~/.sonar
        if [ ! -d ~/.sonar/native-sonar-scanner/sonar-scanner-6.2.1.4610-linux-x64 ]; then
          cd /tmp
          wget -q https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-6.2.1.4610-linux-x64.zip
          unzip -q sonar-scanner-cli-6.2.1.4610-linux-x64.zip -d ~/.sonar/native-sonar-scanner
        fi

    - name: Run SonarQube Scan
      env:
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        LANG: C.UTF-8
        LC_ALL: C.UTF-8
      run: |
        export PATH="$PATH:$HOME/.dotnet/tools"
        ./scripts/sonar-scan.sh "backend-c-sharp" "backend-c-sharp"
