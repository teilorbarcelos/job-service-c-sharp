name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore tests/MageBackend.Tests.csproj

      - name: Lint (dotnet format)
        run: dotnet format src/MageBackend.csproj --verify-no-changes --no-restore

      - name: Build
        run: |
          dotnet build src/MageBackend.csproj --no-restore -c Release
          dotnet build tests/MageBackend.Tests.csproj --no-restore -c Debug

      - name: Run tests with coverage
        env:
          ENVIRONMENT: test
          DATABASE_URL: "Server=localhost,1433;Database=ci;User Id=sa;Password=Password123!;TrustServerCertificate=True;"
          MESSAGING_ENABLED: "false"
        run: |
          rm -rf tests/TestResults tests/coverage.cobertura.xml
          dotnet test tests/MageBackend.Tests.csproj \
            --no-restore \
            -m:1 \
            --collect:"XPlat Code Coverage" \
            --logger "console;verbosity=minimal"
          # Copy to deterministic path for downstream steps
          cp tests/TestResults/*/coverage.cobertura.xml tests/coverage.cobertura.xml
          echo "Coverage file size: $(wc -c < tests/coverage.cobertura.xml) bytes"

      - name: Verify coverage file exists
        run: |
          if [ ! -f tests/coverage.cobertura.xml ]; then
            echo "::error::Coverage file not found at tests/coverage.cobertura.xml"
            exit 1
          fi

      - name: Check coverage gate (100% line+branch, excluding Program.cs)
        run: |
          python3 - <<'PY'
          import re
          with open("tests/coverage.cobertura.xml") as f:
            data = f.read()
          # Sum covered/valid lines and branches across all classes,
          # excluding the Program.cs entry point (unreachable in tests).
          classes = re.findall(
              r'<class[^>]+filename="([^"]+)"[^>]+line-rate="([^"]+)"[^>]+branch-rate="([^"]+)"[^>]*>(.*?)</class>',
              data, re.DOTALL)
          total_lines = total_branches = 0
          cov_lines = cov_branches = 0
          for fn, lr, br, body in classes:
              if fn.endswith("/Program.cs") or fn == "Program.cs":
                  continue
              lines = re.findall(r'<line number="(\d+)" hits="(\d+)"', body)
              total_lines += len(lines)
              cov_lines += sum(1 for _, h in lines if int(h) > 0)
              brs = re.findall(r'condition-coverage="(\d+)% \((\d+)/(\d+)\)"', body)
              for _, hit, total in brs:
                  total_branches += int(total)
                  cov_branches += int(hit)
          if total_lines == 0:
              raise SystemExit("No lines found in coverage report")
          lr = cov_lines / total_lines
          br = cov_branches / total_branches if total_branches else 1.0
          if lr < 0.85 or br < 0.85:
              raise SystemExit(
                  f"Coverage below 85% — lines: {lr*100:.1f}% ({cov_lines}/{total_lines}), "
                  f"branches: {br*100:.1f}% ({cov_branches}/{total_branches})")
          print(f"✅ Coverage gate passed: lines {lr*100:.1f}%, branches {br*100:.1f}%")
          PY
