sonar.projectKey=job-service-c-sharp
sonar.projectName=Job Service C#
sonar.sources=src
sonar.tests=tests
sonar.cs.coverage.reportPaths=tests/TestResults/*/coverage.cobertura.xml
sonar.cs.opencover.reportPaths=tests/TestResults/*/coverage.opencover.xml
sonar.host.url=http://localhost:9000
# sonar.login is set via CI environment variable SONAR_TOKEN

# Ignore hardcoded dev defaults in settings (dev fallback creds)
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=secrets:S6736
sonar.issue.ignore.multicriteria.e1.resourceKey=**/Shared/Config/EnvValidator.cs
sonar.issue.ignore.multicriteria.e2.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.e2.resourceKey=**/Shared/Config/EnvValidator.cs
